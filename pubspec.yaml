name: aiwithshiv
description: A gamified AI learning app for children, teens, and adults.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  lottie: ^3.1.3
  google_fonts: ^6.2.1
  audioplayers: ^6.1.0
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.1
  flutter_tts: ^4.2.2
  device_info_plus: ^11.2.0
  google_mobile_ads: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  min_sdk_android: 23

flutter_native_splash:
  color: "#D32F2F"
  image: assets/app_icon.png
  android: true
  ios: true
  web: true
